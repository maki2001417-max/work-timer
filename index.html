<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工時專家</title>
    
    <meta name="apple-mobile-web-app-title" content="工時專家">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <style>
        :root { 
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; 
            --danger: #FF3B30; --danger-bg: #FFE5E5;
            --warning: #FF9500; --warning-bg: #FFF4E5;
            --success: #34C759; --success-bg: #E5F9E7;
            --gray: #8E8E93; --secondary: #E9E9EB; 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--text); }
        .ios-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); position: relative; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 22px; margin: 0; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px;}
        .version-badge { font-size: 12px; font-weight: 600; background: #E5F0FF; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-family: monospace; letter-spacing: 0.5px;}

        .clear-btn { background: var(--secondary); color: #555; border: none; padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .ios-group { background: #F9F9F9; border-radius: 14px; padding: 0 15px; margin-bottom: 15px; }
        .ios-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #E5E5EA; }
        .ios-item:last-child { border-bottom: none; }
        .ios-item label { font-size: 15px; font-weight: 600; color: #333; }
        .hint { font-size: 12px; color: var(--gray); font-weight: normal; margin-top: 4px; }
        input[type="time"] { border: none; background: var(--secondary); padding: 8px 12px; border-radius: 8px; font-size: 17px; color: var(--primary); font-weight: 700; font-family: inherit; }

        .box-primary { background: #fff; border: 2px solid var(--primary); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 8px; box-shadow: 0 6px 16px rgba(0,122,255,0.15); }
        .box-primary .lbl { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .box-primary .val { font-size: 40px; font-weight: 800; color: var(--primary); line-height: 1.1; }
        .box-secondary { text-align: center; font-size: 13px; color: #8E8E93; font-weight: 500; }
        .box-secondary b { color: #555; }
        
        .alert-box { border-radius: 14px; padding: 12px 15px; margin-bottom: 12px; font-size: 14px; line-height: 1.5; }
        .alert-box.late { background: var(--danger-bg); border-left: 5px solid var(--danger); }
        .alert-box.early { border-left: 5px solid var(--warning); background: #fff; border: 1px solid #E5E5EA; }
        .alert-title { font-weight: 700; font-size: 15px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .alert-title.red { color: var(--danger); }
        .alert-title.orange { color: #D07B00; }
        
        .badge { display: inline-flex; align-items: center; font-family: monospace; font-weight: bold; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 6px; font-size: 15px; color: #333; }
        .hl { font-weight: 800; font-size: 16px; }
        .sub-hint { font-size: 12px; color: #666; margin-top: 8px; line-height: 1.4; }

        .flex-row { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 8px; font-size: 14px;}
        .range-group { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        .dur-tag { color: #E65100; font-size: 13px; margin-left: 6px; background: rgba(230,81,0,0.1); padding: 2px 5px; border-radius: 4px; font-family: -apple-system, sans-serif;}

        #toast {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 12px 20px; border-radius: 20px;
            font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">提示訊息</div>

<div class="ios-card">
    <div class="header-row">
        <h2>工時專家 <span class="version-badge">v2.6</span></h2>
        <button class="clear-btn" onclick="clearAll()">重置</button>
    </div>

    <div class="ios-group">
        <div class="ios-item">
            <label>🕗 上班刷卡 <span class="hint">(08:20起)</span></label>
            <input type="time" id="tIn" value="09:00" max="17:20" min="08:20" onchange="validateAndRun(this)" oninput="run()">
        </div>
        <div class="ios-item">
            <label>🏃 提早下班 <span class="hint">(最晚 18:20)</span></label>
            <input type="time" id="tEarly" max="18:20" onchange="validateAndRun(this)" oninput="run()">
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    let toastTimeout;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg; toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    function validateAndRun(inputElement) {
        if (!inputElement.value) { run(); return; }
        let [h, m] = inputElement.value.split(':').map(Number);
        let mins = h * 60 + m;
        let corrected = null, alertMsg = "";

        if (inputElement.id === 'tIn') {
            if (mins < 500) { corrected = "08:20"; alertMsg = "⚠️ 上班不可早於 08:20，已為您校正"; } 
            else if (mins >= 1040) { corrected = "17:20"; alertMsg = "⚠️ 已過標準下班時間，建議直接請全天假！"; }
        } else if (inputElement.id === 'tEarly') {
            // 【v2.6 修復】將防呆預設值從 530 (08:50) 徹底改為 500 (08:20)
            let inMins = document.getElementById('tIn').value ? 
                document.getElementById('tIn').value.split(':').map(Number).reduce((h, m) => h * 60 + m) : 500;
            if (mins < inMins) { corrected = document.getElementById('tIn').value; alertMsg = "⚠️ 提早下班不可早於上班時間！已為您校正"; } 
            else if (mins > 1100) { corrected = "18:20"; alertMsg = "⚠️ 最晚不可超過 18:20，已自動校正"; }
        }

        if (corrected) { inputElement.value = corrected; showToast(alertMsg); }
        run(); 
    }

    function clearAll() { document.getElementById('tIn').value = "09:00"; document.getElementById('tEarly').value = ""; run(); }

    // 【底層常數確認】tBaseIn 確實是 500 (08:20)，tFlexEnd 確實是 560 (09:20)
    const toStr = (m) => `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;
    const tBaseIn = 500, tFlexEnd = 560, tLunchStart = 710, tLunchEnd = 770, tEarliestOff = 1010, tStandardOff = 1040;

    function walkBwd(startMin, durationMin) {
        let current = startMin, rem = durationMin;
        while (rem > 0) {
            if (current > tLunchEnd) { let step = Math.min(rem, current - tLunchEnd); current -= step; rem -= step; } 
            else if (current > tLunchStart && current <= tLunchEnd) { current = tLunchStart; } 
            else { current -= rem; rem = 0; }
        }
        return current;
    }

    function walkFwd(startMin, durationMin) {
        let current = startMin, rem = durationMin;
        while (rem > 0) {
            if (current < tLunchStart) { let step = Math.min(rem, tLunchStart - current); current += step; rem -= step; } 
            else if (current >= tLunchStart && current < tLunchEnd) { current = tLunchEnd; } 
            else { current += rem; rem = 0; }
        }
        return current;
    }

    function getWorkMinutes(start, end) {
        if (start >= end) return 0;
        let total = end - start;
        let overlapStart = Math.max(start, tLunchStart), overlapEnd = Math.min(end, tLunchEnd);
        if (overlapStart < overlapEnd) total -= (overlapEnd - overlapStart);
        return total;
    }

    function formatLeaveRanges(start, end, isMuted = false) {
        let chunks = [];
        if (start < tLunchStart && end > start) {
            let e = Math.min(end, tLunchStart);
            if (start !== e) chunks.push({ s: start, e: e, h: (e - start) / 60 });
        }
        if (end > tLunchEnd && end > start) {
            let s = Math.max(start, tLunchEnd);
            if (s !== end) chunks.push({ s: s, e: end, h: (end - s) / 60 });
        }
        if (chunks.length === 0) return `<span class="badge">無</span>`;

        let canSplit = chunks.every(c => Math.round(c.h * 100) % 50 === 0);
        let badgeStyle = isMuted ? "background:#E5E5EA; color:#8E8E93;" : "";
        let durStyle = isMuted ? "background:#D1D1D6; color:#fff;" : "";

        if (canSplit) {
            return chunks.map(c => 
                `<span class="badge" style="${badgeStyle}">${toStr(c.s)} - ${toStr(c.e)} <span class="dur-tag" style="${durStyle}">${c.h}h</span></span>`
            ).join('');
        } else {
            let totalH = getWorkMinutes(start, end) / 60;
            let mergeBg = isMuted ? "#F2F2F7" : "#FFF4E5";
            let mergeBorder = isMuted ? "#E5E5EA" : "#FFE0B2";
            let mergeText = isMuted ? "#8E8E93" : "#E65100";
            return `<span class="badge" style="background:${mergeBg}; border:1px solid ${mergeBorder}; color:${mergeText}">${toStr(start)} - ${toStr(end)} <span class="dur-tag" style="background:#fff; color:${mergeText}; border:1px solid ${mergeBorder}">${totalH}h</span></span>`;
        }
    }

    function run() {
        const tIn = document.getElementById('tIn').value;
        const tEarly = document.getElementById('tEarly').value;
        if (!tIn) return; 

        const toMin = (v) => { let [h, m] = v.split(':').map(Number); return h * 60 + m; };
        const inMin = toMin(tIn);
        
        let html = "", shiftStart = inMin, lateLeaveStart = null, lateLeaveEnd = null, totalLateLeaveH = 0, lateMins = 0;
        let isBigLate = (inMin > tLunchStart);

        if (inMin > tFlexEnd) {
            lateMins = inMin - tFlexEnd;
            if (!isBigLate) {
                totalLateLeaveH = Math.ceil(lateMins / 30) * 0.5;
                shiftStart = inMin - totalLateLeaveH * 60; 
                lateLeaveStart = shiftStart; lateLeaveEnd = inMin;
            } else {
                shiftStart = tBaseIn; 
                totalLateLeaveH = Math.ceil(getWorkMinutes(tBaseIn, inMin) / 30) * 0.5;
                lateLeaveStart = tBaseIn; lateLeaveEnd = walkFwd(tBaseIn, totalLateLeaveH * 60);
            }
        }

        if (totalLateLeaveH > 0) {
            let isFullDay = (inMin >= 1040); 
            let hintMsg = isFullDay ? "💡 已達標準下班時間 17:20，請直接填寫整天假單 (8h)。" : 
                          (isBigLate ? "💡 曠職上午喪失彈性，由標準班表 08:20 往後請。" : "💡 彈性內扣除假單後，以此推算下班時間。");

            html += `
            <div class="alert-box late">
                <div class="alert-title red">
                    <span>${isFullDay ? '🚨 需請全天假' : `⚠️ 遲到 ${lateMins} 分鐘`}</span>
                    <span>請假 <span class="hl">${totalLateLeaveH}</span>h</span>
                </div>
                <div class="flex-row">
                    <span style="font-weight:600;">假單區間：</span>
                    <div class="range-group">${formatLeaveRanges(lateLeaveStart, lateLeaveEnd)}</div>
                </div>
                <div class="sub-hint">${hintMsg}</div>
            </div>`;
            if (isFullDay) { document.getElementById('result').innerHTML = html; return; }
        }

        let target7, target8;

        if (isBigLate) {
            target7 = target8 = tStandardOff; 
            html += `
            <div class="box-primary" style="background: #F0F4FF; border-color: #C6D8FF; box-shadow:none;">
                <div class="lbl" style="color:var(--primary); font-size:14px;">🔒 喪失彈性資格</div>
                <div class="val blue">17:20</div>
                <div class="hint" style="color:#555; margin-top:8px;">下班時間已被系統鎖定</div>
            </div>`;
        } else {
            target7 = Math.max(tEarliestOff, shiftStart + 7 * 60 + 60); 
            target8 = Math.max(tEarliestOff, shiftStart + 8 * 60 + 60);
            
            html += `
            <div class="box-primary">
                <div class="lbl">✨ 標準下班時間 (滿 8h)</div>
                <div class="val blue">${toStr(target8)}</div>
                ${target8 === tEarliestOff && (shiftStart + 8 * 60 + 60) < tEarliestOff ? '<div class="hint" style="margin-top:5px">受限於最早下班規定 16:50</div>' : ''}
            </div>`;
        }

        if (tEarly) {
            let earlyMin = Math.max(toMin(tEarly), inMin); 
            html += `<div class="section-title" style="margin-top:20px; margin-bottom:10px; font-weight:700; color:#333; font-size:15px;">🏃 提早分析 (${toStr(earlyMin)})</div>`;

            function generateLeaveInfo(targetOff, label, isMuted = false) {
                if (earlyMin >= targetOff) {
                    if (isMuted) {
                        return `<div class="alert-box" style="background:#F2F2F7; color:#8E8E93; font-weight:600; margin-bottom:10px; text-align:center; padding: 10px; border: 1px dashed #D1D1D6;">🤫 若只求滿 ${label}，其實已經達標免請假了</div>`;
                    } else {
                        return `<div class="alert-box" style="background:var(--success-bg); border-left:5px solid var(--success); color:#1B5E20; font-weight:700; margin-bottom:10px;">✨ 已滿足 ${label}，<span style="text-decoration: underline; text-underline-offset: 3px;">無須請假！</span></div>`;
                    }
                } else {
                    let missingWork = getWorkMinutes(earlyMin, targetOff);
                    let leaveH = Math.ceil(missingWork / 30) * 0.5;
                    
                    let mLeaveH = 0;
                    let aLeaveH = leaveH;
                    let splitNote = "";

                    if (!isBigLate) {
                        // 【v2.6 確認】這段「早晚分切」演算法使用的也是 500 (tBaseIn = 08:20)
                        let maxMorningH = Math.floor(getWorkMinutes(tBaseIn, shiftStart) / 30) * 0.5;
                        mLeaveH = Math.min(leaveH, maxMorningH);
                        aLeaveH = leaveH - mLeaveH;
                    }

                    let slipsHtml = "";

                    if (mLeaveH > 0) {
                        let mSlipStart = walkBwd(shiftStart, mLeaveH * 60);
                        slipsHtml += formatLeaveRanges(mSlipStart, shiftStart, isMuted);
                        let noteColor = isMuted ? "#8E8E93" : "var(--primary)";
                        splitNote = `<div style="font-size:12px; font-weight:700; color:${noteColor}; margin-bottom:6px;">✨ 已啟用早晚分段請假 (避開17:20極限)</div>`;
                    }
                    
                    if (aLeaveH > 0) {
                        let anchorOff = Math.min(targetOff, tStandardOff); 
                        let aSlipEnd = anchorOff;
                        let aSlipStart = walkBwd(anchorOff, aLeaveH * 60);
                        slipsHtml += formatLeaveRanges(aSlipStart, aSlipEnd, isMuted);
                    }

                    let hitTime = walkBwd(targetOff, leaveH * 60);

                    let boxStyle = isMuted ? "background:#FAFAFA; border:1px dashed #D1D1D6;" : "background:#fff; border:1px solid #E5E5EA;";
                    let titleStyle = isMuted ? "color:#8E8E93;" : "color:#D07B00;";
                    let dangerStyle = isMuted ? "color:#8E8E93;" : "color:var(--danger);";
                    let hintStyle = isMuted ? "color:#8E8E93;" : "color:#666;";

                    return `
                    <div class="alert-box early" style="${boxStyle} margin-bottom:10px;">
                        <div class="alert-title">
                            <span style="${titleStyle}">🎯 目標 ${label}</span>
                            <span style="${titleStyle}">請假 <span class="hl" style="${dangerStyle}">${leaveH}</span>h</span>
                        </div>
                        ${splitNote}
                        <div class="flex-row">
                            <span style="font-weight:600; ${hintStyle}">假單區間：</span>
                            <div class="range-group">${slipsHtml}</div>
                        </div>
                        <div class="sub-hint" style="${hintStyle}">💡 請假後，只要待到 <b style="color:${isMuted?'#8E8E93':'var(--primary)'}">${toStr(hitTime)}</b> 即可達標。</div>
                    </div>`;
                }
            }
            
            if (isBigLate) {
                html += generateLeaveInfo(target8, "標準班表 (17:20)");
            } else {
                html += generateLeaveInfo(target8, "8h (標準)");
                html += `
                <div class="box-secondary" style="margin-top: 25px; margin-bottom: 10px;">
                    🤫 小聲說：如果今天只上滿 7h，<b>${toStr(target7)}</b> 就能閃人了
                    ${target7 === tEarliestOff && (shiftStart + 7 * 60 + 60) < tEarliestOff ? ' <span style="font-size:11px">(受限16:50)</span>' : ''}
                </div>`;
                html += generateLeaveInfo(target7, "7h (最低底線)", true);
            }
        } else {
            if (!isBigLate) {
                html += `
                <div class="box-secondary" style="margin-top: 15px; margin-bottom: 10px;">
                    🤫 小聲說：如果今天只上滿 7h，<b>${toStr(target7)}</b> 就能閃人了
                    ${target7 === tEarliestOff && (shiftStart + 7 * 60 + 60) < tEarliestOff ? ' <span style="font-size:11px">(受限16:50)</span>' : ''}
                </div>`;
            }
        }

        document.getElementById('result').innerHTML = html;
    }

    document.querySelectorAll('input[type="time"]').forEach(input => {
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
    });

    run();
</script>

</body>
</html>
