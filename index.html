<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工時請假專家 Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; --danger: #FF3B30; --success: #34C759; --gray: #8E8E93; --secondary: #E9E9EB; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .ios-card { background: var(--card); width: 100%; max-width: 420px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-size: 20px; margin-bottom: 20px; font-weight: 600; }
        .ios-group { background: #F9F9F9; border-radius: 12px; padding: 5px 15px; margin-bottom: 15px; }
        .ios-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #E5E5EA; }
        .ios-item:last-child { border-bottom: none; }
        .ios-item label { font-size: 16px; font-weight: 500; }
        input[type="time"] { border: none; background: var(--secondary); padding: 8px 12px; border-radius: 8px; font-size: 17px; color: var(--primary); font-weight: 600; font-family: inherit; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button.ios-btn { flex: 2; background: var(--primary); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button.ios-btn-secondary { flex: 1; background: var(--secondary); color: var(--text); border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 500; cursor: pointer; }
        button:active { opacity: 0.7; }

        .section-title { font-size: 13px; color: var(--gray); font-weight: 600; margin: 20px 0 8px 5px; text-transform: uppercase; }
        .ios-box { background: white; border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid #E5E5EA; animation: fadeIn 0.3s ease; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .res-label { font-weight: 600; color: #3A3A3C; }
        .res-val { font-weight: 700; color: var(--primary); font-size: 18px; }
        .leave-badge { background: #FFF0F0; color: var(--danger); padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 14px; line-height: 1.5; }
        .leave-range { display: block; font-family: monospace; font-weight: bold; background: #FFE5E5; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
        .success-text { color: var(--success); font-weight: bold; }
        .info-text { font-size: 12px; color: var(--gray); margin-top: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="ios-card">
    <h2>工時查詢系統</h2>
    <div class="ios-group">
        <div class="ios-item">
            <label>🕗 上班刷卡</label>
            <input type="time" id="tIn" value="09:08">
        </div>
        <div class="ios-item">
            <label>🏃 提早下班 (最低16:50)</label>
            <input type="time" id="tEarly">
        </div>
    </div>

    <div class="btn-row">
        <button class="ios-btn-secondary" onclick="clearAll()">清除</button>
        <button class="ios-btn" onclick="run()">開始分析</button>
    </div>

    <div id="result"></div>
</div>

<script>
    function clearAll() {
        document.getElementById('tIn').value = "";
        document.getElementById('tEarly').value = "";
        document.getElementById('result').innerHTML = "";
    }

    function run() {
        const tIn = document.getElementById('tIn').value;
        const tEarly = document.getElementById('tEarly').value;
        if (!tIn) return;

        const toMin = (v) => { let [h, m] = v.split(':').map(Number); return h * 60 + m; };
        const toStr = (m) => { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; };

        const inMin = toMin(tIn);
        const earliestOff = 16 * 60 + 50; // 16:50
        const deadline = 18 * 60 + 20;   // 18:20
        const latestIn = 9 * 60 + 20;     // 09:20
        const lunch = 60;
        
        let html = "";

        // 1. 遲到檢查
        if (inMin > latestIn) {
            let lateM = inMin - latestIn;
            let leaveH = Math.ceil(lateM / 30) * 0.5;
            html += `<div class="section-title">⚠️ 遲到補救</div>
                     <div class="ios-box" style="border-left: 5px solid var(--danger)">
                        <div class="res-row"><span class="res-label">遲到時數</span><span style="color:var(--danger)">${lateM} 分鐘</span></div>
                        <div class="leave-badge">建議請假 <b>${leaveH}h</b> 抵銷：<br>
                        <span class="leave-range">單據區間：${toStr(inMin - leaveH*60)} - ${toStr(inMin)}</span></div>
                     </div>`;
        }

        // 2. 標準分析
        function getGoal(targetH) {
            let targetM = targetH * 60;
            let idealOff = Math.max(earliestOff, inMin + targetM + lunch);
            let res = `<div class="ios-box"><div class="res-row"><span class="res-label">滿 ${targetH} 小時</span>`;
            
            if (idealOff <= deadline) {
                res += `<span class="res-val success-text">${toStr(idealOff)}</span></div>`;
                if (idealOff === earliestOff && (inMin + targetM + lunch) < earliestOff) {
                    res += `<div class="info-text">💡 已滿 ${targetH}h，但受限於 16:50 規定。</div>`;
                }
            } else {
                let actualWorkAtDeadline = deadline - inMin - lunch;
                let gap = targetM - actualWorkAtDeadline;
                let leaveH = Math.ceil(gap / 30) * 0.5;
                res += `<span class="res-val" style="color:var(--danger)">18:20 (不足)</span></div>`;
                res += `<div class="leave-badge">需請假 <b>${leaveH}h</b> 補足：<br>
                        <span class="leave-range">單據區間：${toStr(inMin - leaveH * 60)} - ${toStr(inMin)}</span></div>`;
            }
            res += `</div>`;
            return res;
        }
        html += `<div class="section-title">📊 標準下班時間</div>` + getGoal(8) + getGoal(7);

        // 3. 提早下班分析
        if (tEarly) {
            let earlyMinInput = toMin(tEarly);
            let isViolating = earlyMinInput < earliestOff;
            let realEarlyMin = Math.max(earliestOff, Math.min(earlyMinInput, deadline));
            
            html += `<div class="section-title">🏃 提早下班分析 (${toStr(earlyMinInput)})</div><div class="ios-box" style="border-left: 5px solid var(--primary)">`;
            
            if (isViolating) html += `<div style="color:var(--danger); font-weight:bold; margin-bottom:10px;">⚠️ 警告：早於 16:50 規定時間</div>`;

            let workMin = realEarlyMin - inMin - lunch;
            let gap7 = 420 - workMin;
            
            if (gap7 <= 0) {
                html += `<div class="success-text">✨ 此時間下班已滿足 7 小時最低標</div>`;
            } else {
                let leaveH = Math.ceil(gap7 / 30) * 0.5;
                html += `<div class="res-row"><span class="res-label">需補假單時數</span><span class="res-val" style="color:var(--danger)">${leaveH}h</span></div>`;
                html += `<div class="leave-badge">建議請假區間 (刷卡點往前推)：<br>`;
                html += `<span class="leave-range">單據區間：${toStr(inMin - leaveH*60)} - ${toStr(inMin)}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        }

        document.getElementById('result').innerHTML = html;
    }
</script>

</body>
</html>
