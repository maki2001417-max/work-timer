<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工時專家</title>
    
    <meta name="apple-mobile-web-app-title" content="工時專家">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <style>
        :root { 
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; 
            --danger: #FF3B30; --danger-bg: #FFE5E5;
            --warning: #FF9500; --warning-bg: #FFF4E5;
            --success: #34C759; --success-bg: #E5F9E7;
            --gray: #8E8E93; --secondary: #E9E9EB; 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--text); }
        .ios-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 22px; margin: 0; font-weight: 700; color: var(--primary); }
        .clear-btn { background: var(--secondary); color: #555; border: none; padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .ios-group { background: #F9F9F9; border-radius: 14px; padding: 0 15px; margin-bottom: 15px; }
        .ios-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #E5E5EA; }
        .ios-item:last-child { border-bottom: none; }
        .ios-item label { font-size: 15px; font-weight: 600; color: #333; }
        .hint { font-size: 12px; color: var(--gray); font-weight: normal; margin-top: 4px; }
        input[type="time"] { border: none; background: var(--secondary); padding: 8px 12px; border-radius: 8px; font-size: 17px; color: var(--primary); font-weight: 700; font-family: inherit; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .box-compact { background: #fff; border: 1px solid #E5E5EA; border-radius: 14px; padding: 12px; text-align: center; }
        .box-compact .lbl { font-size: 13px; color: var(--gray); font-weight: 700; margin-bottom: 5px; }
        .box-compact .val { font-size: 22px; font-weight: 800; color: var(--success); }
        .box-compact .val.blue { color: var(--primary); }
        
        .alert-box { border-radius: 14px; padding: 12px 15px; margin-bottom: 12px; font-size: 14px; line-height: 1.5; }
        .alert-box.late { background: var(--danger-bg); border-left: 5px solid var(--danger); }
        .alert-box.early { border-left: 5px solid var(--warning); background: #fff; border: 1px solid #E5E5EA; }
        .alert-title { font-weight: 700; font-size: 15px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .alert-title.red { color: var(--danger); }
        .alert-title.orange { color: #D07B00; }
        
        .badge { display: inline-flex; align-items: center; font-family: monospace; font-weight: bold; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 6px; font-size: 15px; color: #333; }
        .hl { font-weight: 800; font-size: 16px; }
        .sub-hint { font-size: 12px; color: #666; margin-top: 8px; }

        .flex-row { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 8px; font-size: 14px;}
        .range-group { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        .dur-tag { color: #E65100; font-size: 13px; margin-left: 6px; background: rgba(230,81,0,0.1); padding: 2px 5px; border-radius: 4px; font-family: -apple-system, sans-serif;}

        /* App 質感提示浮窗 (Toast) */
        #toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<div id="toast">提示訊息</div>

<div class="ios-card">
    <div class="header-row">
        <h2>工時專家</h2>
        <button class="clear-btn" onclick="clearAll()">重置</button>
    </div>

    <div class="ios-group">
        <div class="ios-item">
            <label>🕗 上班刷卡 <span class="hint">(08:50 - 18:20)</span></label>
            <input type="time" id="tIn" value="09:00" onchange="validateAndRun(this)" oninput="run()">
        </div>
        <div class="ios-item">
            <label>🏃 提早下班 <span class="hint">(≥16:50)</span></label>
            <input type="time" id="tEarly" onchange="validateAndRun(this)" oninput="run()">
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    let toastTimeout;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // 智慧防呆校正功能
    function validateAndRun(inputElement) {
        if (!inputElement.value) { run(); return; }
        
        let [h, m] = inputElement.value.split(':').map(Number);
        let mins = h * 60 + m;
        let corrected = null;
        let alertMsg = "";

        if (mins < 530) { 
            corrected = "08:50"; 
            alertMsg = "⚠️ 最早不可早於 08:50，已為您校正";
        } else if (mins > 710 && mins < 770) {
            // 落入午休時間，判斷靠近哪一邊
            if (mins <= 740) { corrected = "11:50"; } 
            else { corrected = "12:50"; }
            alertMsg = "⚠️ 午休時間不計入，已為您自動避開";
        } else if (mins > 1100) { 
            corrected = "18:20"; 
            alertMsg = "⚠️ 最晚不可超過 18:20，已為您校正";
        }

        if (corrected) {
            inputElement.value = corrected;
            showToast(alertMsg);
        }
        
        run(); // 校正完畢後執行主計算
    }

    function clearAll() {
        document.getElementById('tIn').value = "09:00";
        document.getElementById('tEarly').value = "";
        run(); 
    }

    const toStr = (m) => `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;

    const tBaseIn = 500;       // 08:20
    const tFlexEnd = 560;      // 09:20
    const tLunchStart = 710;   // 11:50
    const tLunchEnd = 770;     // 12:50
    const tEarliestOff = 1010; // 16:50

    function walkBwd(startMin, durationMin) {
        let current = startMin, rem = durationMin;
        while (rem > 0) {
            if (current > tLunchEnd) {
                let step = Math.min(rem, current - tLunchEnd);
                current -= step; rem -= step;
            } else if (current > tLunchStart && current <= tLunchEnd) {
                current = tLunchStart; 
            } else {
                current -= rem; rem = 0;
            }
        }
        return current;
    }

    function getWorkMinutes(start, end) {
        if (start >= end) return 0;
        let total = end - start;
        let overlapStart = Math.max(start, tLunchStart);
        let overlapEnd = Math.min(end, tLunchEnd);
        if (overlapStart < overlapEnd) total -= (overlapEnd - overlapStart);
        return total;
    }

    function getLeaveChunks(start, end) {
        let chunks = [];
        if (start < tLunchStart && end > start) {
            let e = Math.min(end, tLunchStart);
            if (start !== e) chunks.push({ s: start, e: e, h: (e - start) / 60 });
        }
        if (end > tLunchEnd && end > start) {
            let s = Math.max(start, tLunchEnd);
            if (s !== end) chunks.push({ s: s, e: end, h: (end - s) / 60 });
        }
        return chunks;
    }

    function run() {
        const tIn = document.getElementById('tIn').value;
        const tEarly = document.getElementById('tEarly').value;
        if (!tIn) return; 

        const toMin = (v) => { let [h, m] = v.split(':').map(Number); return h * 60 + m; };
        const inMin = toMin(tIn);
        
        let html = "";
        
        let shiftStart = inMin;
        let lateLeaveList = [];
        let totalLateLeaveH = 0;
        let lateMins = 0;

        // === 1. 遲到分流邏輯 ===
        if (inMin > tFlexEnd) {
            lateMins = inMin - tFlexEnd;
            
            if (inMin <= tLunchStart) {
                let leaveH = Math.ceil(lateMins / 30) * 0.5;
                let virtualIn = inMin - leaveH * 60;
                
                shiftStart = virtualIn; 
                lateLeaveList.push({ s: virtualIn, e: inMin, h: leaveH });
                totalLateLeaveH = leaveH;
            } else {
                shiftStart = tBaseIn; 
                lateLeaveList.push({ s: tBaseIn, e: tLunchStart, h: 3.5 });
                totalLateLeaveH += 3.5;
                
                if (inMin > tLunchEnd) {
                    let gap = inMin - tLunchEnd;
                    let leaveH = Math.ceil(gap / 30) * 0.5;
                    let leaveEnd = tLunchEnd + leaveH * 60;
                    lateLeaveList.push({ s: tLunchEnd, e: leaveEnd, h: leaveH });
                    totalLateLeaveH += leaveH;
                }
            }
        }

        if (lateLeaveList.length > 0) {
            let rangesHtml = lateLeaveList.map(l => 
                `<span class="badge">${toStr(l.s)} - ${toStr(l.e)} <span class="dur-tag">${l.h}h</span></span>`
            ).join('');
            
            let hintMsg = inMin > tLunchStart 
                ? "💡 曠職上午喪失彈性，由標準班表 08:20 往後請。" 
                : "💡 彈性內扣除假單後，以此推算下班時間。";

            html += `
            <div class="alert-box late">
                <div class="alert-title red">
                    <span>⚠️ 遲到 ${lateMins} 分鐘</span>
                    <span>請假 <span class="hl">${totalLateLeaveH}</span>h</span>
                </div>
                <div class="flex-row">
                    <span style="font-weight:600;">假單區間：</span>
                    <div class="range-group">${rangesHtml}</div>
                </div>
                <div class="sub-hint">${hintMsg}</div>
            </div>`;
        }

        // === 2. 並排標準時間 ===
        const mark7 = shiftStart + 7 * 60 + 60; 
        const mark8 = shiftStart + 8 * 60 + 60;
        
        const disp7 = Math.max(tEarliestOff, mark7);
        const disp8 = Math.max(tEarliestOff, mark8);
        
        html += `
        <div class="grid-2">
            <div class="box-compact">
                <div class="lbl">滿 7h (最低)</div>
                <div class="val">${toStr(disp7)}</div>
                ${disp7 === tEarliestOff && mark7 < tEarliestOff ? '<div class="hint">受限 16:50</div>' : ''}
            </div>
            <div class="box-compact">
                <div class="lbl">滿 8h (標準)</div>
                <div class="val blue">${toStr(disp8)}</div>
                ${disp8 === tEarliestOff && mark8 < tEarliestOff ? '<div class="hint">受限 16:50</div>' : ''}
            </div>
        </div>`;

        // === 3. 提早下班分析 ===
        if (tEarly) {
            let earlyMin = toMin(tEarly);
            html += `<div class="section-title">🏃 提早分析 (${toStr(earlyMin)})</div>`;

            function generateLeaveInfo(targetOff, label) {
                if (earlyMin >= targetOff) {
                    return `
                    <div class="alert-box" style="background:var(--success-bg); border-left:5px solid var(--success); color:#1B5E20; font-weight:700; margin-bottom:10px;">
                        ✨ 已滿足 ${label}，<span style="text-decoration: underline; text-underline-offset: 3px;">無須請假！</span>
                    </div>`;
                } else {
                    let missingWork = getWorkMinutes(earlyMin, targetOff);
                    let leaveH = Math.ceil(missingWork / 30) * 0.5;
                    let leaveStart = walkBwd(targetOff, leaveH * 60);

                    let chunks = getLeaveChunks(leaveStart, targetOff);
                    let rangesHtml = chunks.map(l => 
                        `<span class="badge">${toStr(l.s)} - ${toStr(l.e)} <span class="dur-tag">${l.h}h</span></span>`
                    ).join('');

                    return `
                    <div class="alert-box early" style="margin-bottom:10px;">
                        <div class="alert-title orange">
                            <span>🎯 目標 ${label}</span>
                            <span>請假 <span class="hl" style="color:var(--danger)">${leaveH}</span>h</span>
                        </div>
                        <div class="flex-row">
                            <span style="font-weight:600;">假單區間：</span>
                            <div class="range-group">${rangesHtml}</div>
                        </div>
                        <div class="sub-hint">💡 請假後，只要待到 <b style="color:var(--primary)">${toStr(leaveStart)}</b> 即可達標。</div>
                    </div>`;
                }
            }

            html += generateLeaveInfo(disp7, "7h (最低)");
            html += generateLeaveInfo(disp8, "8h (標準)");
        }

        document.getElementById('result').innerHTML = html;
    }

    document.querySelectorAll('input[type="time"]').forEach(input => {
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
    });

    run();
</script>

</body>
</html>
